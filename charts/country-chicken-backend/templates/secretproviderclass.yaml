{{- if .Values.secrets.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "app.name" . }}-secrets

spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "{{ .Values.secrets.objectName }}"
        objectType: "secretsmanager"
{{- end }}