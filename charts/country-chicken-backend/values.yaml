# Namespace (handled by helm install -n, no need to hardcode in templates)
namespace:
  create: false
  name: country-chicken

# Replica (used when HPA disabled)
replicaCount: 2

image:
  repository: "54.226.123.235:8082/docker-releases/country-chicken-backend"
  tag: "1.0.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: country-chicken-sa
  irsaRoleArn: "arn:aws:iam::123185599168:role/country-chicken-irsa-role"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

probes:
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 20
    periodSeconds: 10
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 20

# ✅ Enable autoscaling for production
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Optional app config
config: {}

# ✅ ALB Ingress (fixed health check)
ingress:
  enabled: true
  className: alb
  host: ""   # no domain → use ALB DNS
  path: /
  pathType: Prefix
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health/readiness

# Optional secrets (IRSA + Secrets Manager)
secrets:
  enabled: false
  objectName: ""
